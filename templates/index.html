<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Brain Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: #16213e;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
        }
        .container h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .container .subtitle {
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .status {
            display: inline-block;
            background: #4ade80;
            color: #1a1a2e;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .user-info {
            background: #1a1a3e;
            padding: 12px 20px;
            border-radius: 10px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-info .email {
            color: #94a3b8;
            font-size: 14px;
        }
        .logout-btn {
            padding: 6px 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .logout-btn:hover {
            background: #c0392b;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .feature {
            background: #1a1a3e;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
            color: #94a3b8;
        }
        .feature .icon { font-size: 24px; display: block; margin-bottom: 4px; }
        .feature .label { font-size: 12px; }
        .cta {
            margin-top: 20px;
            color: #94a3b8;
            font-size: 14px;
        }
        .cta a {
            color: #6C63FF;
            text-decoration: none;
            font-weight: 500;
        }
        .cta a:hover { text-decoration: underline; }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6C63FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loader" id="loader"></div>
        <div id="content" style="display:none;">
            <h1>🧠 Knowledge Brain</h1>
            <p class="subtitle">AI-powered document Q&A</p>
            <div class="status">✅ Connected</div>

            <div class="user-info">
                <span class="email" id="userEmail">Loading...</span>
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>

            <div class="features">
                <div class="feature">
                    <span class="icon">📚</span>
                    <span class="label">10 Documents</span>
                </div>
                <div class="feature">
                    <span class="icon">📄</span>
                    <span class="label" id="chunkCount">6,247 Chunks</span>
                </div>
                <div class="feature">
                    <span class="icon">🤖</span>
                    <span class="label">AI Assistant</span>
                </div>
            </div>

            <p class="cta">
                💬 Click the chat bubble in the bottom-right corner to start asking questions!
            </p>
            <p style="color: #64748b; font-size: 12px; margin-top: 12px;">
                Powered by Pinecone + Groq + HuggingFace
            </p>
        </div>
    </div>

    <!-- ===== CHAT WIDGET ===== -->
    <script>
        // Check if user is logged in
        const token = localStorage.getItem('chatbot_token');
        if (!token) {
            window.location.href = '/login';
        }

        // Load user info
        async function loadUserInfo() {
            try {
                const res = await fetch('/api/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('userEmail').textContent = data.user.email;
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } else {
                    localStorage.removeItem('chatbot_token');
                    window.location.href = '/login';
                }
            } catch (e) {
                console.error('Error loading user info:', e);
                window.location.href = '/login';
            }
        }

        // Load stats
        async function loadStats() {
            try {
                const res = await fetch('/api/stats', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('chunkCount').textContent = 
                        data.total_chunks.toLocaleString() + ' Chunks';
                }
            } catch (e) {
                console.error('Error loading stats:', e);
            }
        }

        async function handleLogout() {
            try {
                await fetch('/api/logout', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
            } catch(e) {}
            localStorage.removeItem('chatbot_token');
            window.location.href = '/login';
        }

        loadUserInfo();
        loadStats();

        // ── Widget configuration ──
        window.CHATBOT_API_URL = window.location.origin;
        window.CHATBOT_NAME = 'Knowledge Bot';
        window.CHATBOT_AVATAR = '🧠';
        window.CHATBOT_COLOR = '#6C63FF';
        window.CHATBOT_GREETING = 'Hello! Ask me anything about our documents.';
    </script>
    <script src="/widget.js"></script>
</body>
</html>
